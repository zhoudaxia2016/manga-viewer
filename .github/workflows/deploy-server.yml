name: Deploy Backend to Deno Deploy

on:
  push:
    branches: [main]
    paths:
      - 'server/**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: '2.x'

      - name: Deploy to Deno Deploy
        run: |
          cd server
          deno run -A jsr:@deno/deployctl deploy --project=${{ vars.DENO_PROJECT_NAME }} main.ts
        env:
          QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
          QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
          QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
          QINIU_DOMAIN: ${{ secrets.QINIU_DOMAIN }}
          DB_PATH: ./manga.db
